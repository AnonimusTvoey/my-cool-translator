name: Build My App
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4 # Обновили до v4
      - name: Set up Python
        uses: actions/setup-python@v5 # Обновили до v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install keyboard pyperclip requests pyinstaller
      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole main.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # ВОТ ТУТ была главная ошибка, теперь v4
        with:
          name: TranslatorApp
          path: dist/main.exe
