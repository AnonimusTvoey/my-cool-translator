name: Build My App
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install keyboard pyperclip requests pyinstaller
      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --admin main.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: TranslatorApp
          path: dist/main.exe
