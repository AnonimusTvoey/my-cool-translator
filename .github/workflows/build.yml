name: Build Modern App
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install keyboard pyperclip requests customtkinter darkdetect pyinstaller
      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --collect-all customtkinter main.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordTranslator
          path: dist/main.exe
